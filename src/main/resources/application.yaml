server:
  port: 8081

spring:

  application:
    name: auth

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USERNAME:authuserdb}
    password: ${DB_PASSWORD:authuserdb}

  jpa:

    open-in-view: false

    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:

    enabled: true

    baseline-on-migrate: true

    validate-on-migrate: true

    locations:
      - classpath:db/migration

logging:

  level:
    org.flywaydb: INFO

