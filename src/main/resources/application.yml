server:
  port: 8081

spring:
  application:
    name: auth

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations:
      - classpath:db/migration

logging:
  level:
    org.flywaydb: INFO

jwt:
  issuer: ${JWT_ISSUER:devopswithprashant-auth}
  audience: ${JWT_AUDIENCE:devopswithprashant-platform}
  secret: ${JWT_SECRET:change-this-for-local-development-only}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:3600}